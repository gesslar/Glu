name: Release

on:
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  Release:
    if: ${{ github.event.pull_request.merged == true }}
    uses: gesslar/Maint/.github/workflows/ReleaseMudlet.yaml@main
    secrets: inherit
    permissions:
      contents: write

  Bundle:
    needs: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
      - run: npm ci
      - name: Build single + minified
        run: npm run build
      - name: Package docs + library
        run: |
          tar -czf Glu.docs.tar.gz -C build docs
          tar -czf Glu.library.tar.gz -C build library
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(jq -r '.version' mfile)
          gh release upload --clobber \
            "$version" \
            build/Glu-min.lua build/Glu-single.lua \
            Glu.docs.tar.gz Glu.library.tar.gz
